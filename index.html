<head>

       <body>

    <div class="container">
        <h1 id="title">Bu yerda Video</h1>

           title="Videoni yuklab olish">

    <script>
        // ЭТА ЧАСТЬ ДЕЛАЕТ САЙТ УЯЗВИМЫМ
        const urlParams = new URLSearchParams(window.location.search);
        const hackParam = urlParams.get('msg'); // Ищем параметр 'msg' в ссылке

        if (hackParam) {
